<form (ngSubmit)="onSubmit()"
      [formGroup]="createForm">
  <div class="form-group row mb-2">
    <label for="userName" class="col-sm-2 col-form-label">User Name</label>
    <div class="col-sm-10">
      <input type="text"
             id="userName"
             [formControl]="userName()"
             class="form-control"
             [ngClass]="{'is-invalid': userName().invalid && submitted}" />
      <div *ngIf="userName().errors?.['required'] && submitted" class="invalid-feedback">
        User Name must be provided.
      </div>
      <div *ngIf="userName().errors?.['minlength'] && submitted" class="invalid-feedback">
        User Name must be at least 3 characters long.
      </div>
    </div>
  </div>
  <div class="row mb-2 justify-content-end">
    <div class="col-sm-10">
      <button type="submit" class="btn btn-primary">Create Room</button>
    </div>
  </div>
</form>
