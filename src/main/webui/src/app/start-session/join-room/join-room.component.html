<form (ngSubmit)="onSubmit()"
      [formGroup]="joinForm">
  <div class="form-group row mb-2">
    <label for="roomId" class="col-sm-2 col-form-label">Room ID</label>
    <div class="col-sm-10">
      <input type="text"
             id="roomId"
             [formControl]="roomControl()"
             class="form-control"
             [ngClass]="{'is-invalid': roomControl().invalid && submitted}"/>
      <div *ngIf="roomControl().invalid && submitted" class="invalid-feedback">
        Room ID is required.
      </div>
    </div>
  </div>
  <div class="form-group row mb-2">
    <label for="userName" class="col-sm-2 col-form-label">User Name</label>
    <div class="col-sm-10">
      <input type="text"
             id="userName"
             [formControl]="userNameControl()"
             class="form-control"
             [ngClass]="{'is-invalid': userNameControl().invalid && submitted}"/>
      <div *ngIf="userNameControl().errors?.['required'] && submitted" class="invalid-feedback">
        User Name must be provided.
      </div>
      <div *ngIf="userNameControl().errors?.['minlength'] && submitted" class="invalid-feedback">
        User Name must be at least 3 characters long.
      </div>
    </div>
  </div>
  <div class="row mb-2 justify-content-end">
    <div class="col-sm-10">
      <button type="submit" class="btn btn-primary">Join Room</button>
    </div>
  </div>
</form>
